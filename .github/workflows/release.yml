name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  docker:
    name: Build & push ${{ matrix.image }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        # arm64 dropped from `web` and `api` images: QEMU cross-build hangs
        # indefinitely (>40min) on the next-auth / Next.js standalone
        # toolchains under emulation. Closes #98 (recurring v0.4.4/v0.4.5
        # behaviour where the api job was the lone laggard while web/gateway
        # finished in ~5min).
        #
        # `gateway` keeps multi-arch — its dep tree is leaner (no
        # next-auth, no Next.js standalone) and arm64 builds reliably in
        # ~5min like the amd64 pass.
        #
        # arm64 hosts run the api/web tiers under amd64 emulation. Same
        # workaround was already documented for web; api now joins.
        include:
          - image: api
            platforms: linux/amd64
          - image: gateway
            platforms: linux/amd64,linux/arm64
          - image: web
            platforms: linux/amd64
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive repo-owner-lowercased
        id: owner
        run: echo "name=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.${{ matrix.image }}
          platforms: ${{ matrix.platforms }}
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.name }}/aide-${{ matrix.image }}:${{ github.ref_name }}
            ghcr.io/${{ steps.owner.outputs.name }}/aide-${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          provenance: false

  release:
    name: GitHub Release
    needs: docker
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
