name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  docker:
    name: Build & push ${{ matrix.image }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        # Plan 4C Part 12 — arm64 dropped from `web` image: QEMU cross-build
        # of the Next.js standalone bundle was unstable (intermittent OOM and
        # node_modules native-binding mismatches). `api` and `gateway` keep
        # multi-arch coverage; users on arm64 hosts can still run the web tier
        # under amd64 emulation if absolutely required.
        include:
          - image: api
            platforms: linux/amd64,linux/arm64
          - image: gateway
            platforms: linux/amd64,linux/arm64
          - image: web
            platforms: linux/amd64
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive repo-owner-lowercased
        id: owner
        run: echo "name=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.${{ matrix.image }}
          platforms: ${{ matrix.platforms }}
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.name }}/aide-${{ matrix.image }}:${{ github.ref_name }}
            ghcr.io/${{ steps.owner.outputs.name }}/aide-${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          provenance: false

  release:
    name: GitHub Release
    needs: docker
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
